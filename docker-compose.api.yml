services:
  olcrtc-apified:
    build:
      context: .
    image: burgerbot/olcrtc-apified
    container_name: olcrtc-apified
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OLCRTC_MODE: api
      OLCRTC_MASTER_KEY: "${OLCRTC_MASTER_KEY:?set OLCRTC_MASTER_KEY}"
      OLCRTC_MAX_CHANNELS: "${OLCRTC_MAX_CHANNELS:-10}"
      OLCRTC_DNS: "${OLCRTC_DNS:-1.1.1.1:53}"
      OLCRTC_DB_PATH: /var/lib/olcrtc/channels.db
      OLCRTC_API_LISTEN: ":8080"
      OLCRTC_DEBUG: "${OLCRTC_DEBUG:-false}"
    volumes:
      - olcrtc-apified-state:/var/lib/olcrtc
    init: true

volumes:
  olcrtc-apified-state:
